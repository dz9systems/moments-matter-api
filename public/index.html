<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moments Matter — Analyze &amp; Generate</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-gray-50 text-gray-900 antialiased">
    <div class="max-w-6xl mx-auto px-4 py-10">
      <header class="mb-10">
        <h1 class="text-3xl font-bold tracking-tight">Moments Matter</h1>
        <p class="text-gray-600 mt-2">
          <strong class="text-gray-800">1.</strong> POST <code class="bg-gray-200 px-1 rounded">/api/analyze</code>
          → moments ·
          <strong class="text-gray-800">2.</strong> POST <code class="bg-gray-200 px-1 rounded">/api/generate</code>
          → creative packet (same shape as your <code class="bg-gray-200 px-1 rounded">CreativePacketView</code>)
        </p>
      </header>

      <!-- Step 1: Analyze -->
      <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-8">
        <h2 class="text-lg font-bold mb-3">Analyze</h2>
        <textarea
          id="transcript"
          rows="5"
          class="w-full border border-gray-200 rounded-xl p-4 text-sm focus:ring-2 focus:ring-orange-400 focus:border-orange-400 outline-none"
          placeholder="Paste transcript or story text…"
        ></textarea>
        <div class="mt-4 flex flex-wrap gap-3 items-center">
          <button
            type="button"
            id="btn-analyze"
            class="px-5 py-2.5 rounded-xl bg-gradient-to-r from-orange-500 to-rose-500 text-white font-semibold text-sm shadow hover:opacity-95"
          >
            Run analyze
          </button>
          <span id="analyze-status" class="text-sm text-gray-500"></span>
        </div>
        <p id="transcript-preview" class="mt-4 text-xs text-gray-400 hidden"></p>
      </section>

      <!-- Moments -->
      <section id="moments-section" class="hidden mb-8">
        <h2 class="text-lg font-bold mb-3">Pick a moment</h2>
        <div id="moments-list" class="space-y-2"></div>
        <div class="mt-6 flex flex-wrap gap-3 items-end">
          <div class="flex-1 min-w-[200px]">
            <label class="block text-xs font-medium text-gray-500 mb-1">Goal</label>
            <input
              id="goal"
              type="text"
              class="w-full border border-gray-200 rounded-xl px-4 py-2 text-sm"
              value="60-second TikTok-style video about this moment"
            />
          </div>
          <button
            type="button"
            id="btn-generate"
            disabled
            class="px-5 py-2.5 rounded-xl bg-indigo-600 text-white font-semibold text-sm disabled:opacity-40"
          >
            Generate packet
          </button>
        </div>
        <p id="generate-status" class="mt-2 text-sm text-gray-500"></p>
      </section>

      <!-- Packet (mirrors CreativePacketView sections) -->
      <div id="packet-root" class="hidden space-y-8"></div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const API = '';

      let selectedMomentId = null;

      function esc(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      async function copyText(text, btn) {
        try {
          await navigator.clipboard.writeText(text);
          const prev = btn.innerHTML;
          btn.innerHTML = '✓';
          btn.classList.add('text-green-600');
          setTimeout(() => {
            btn.innerHTML = prev;
            btn.classList.remove('text-green-600');
          }, 2000);
        } catch (_) {}
      }

      $('btn-analyze').onclick = async () => {
        const text = $('transcript').value.trim();
        if (!text) {
          $('analyze-status').textContent = 'Enter some text.';
          return;
        }
        $('analyze-status').textContent = 'Analyzing…';
        $('btn-analyze').disabled = true;
        try {
          const fd = new FormData();
          fd.append('text', text);
          const res = await fetch(API + '/api/analyze', { method: 'POST', body: fd });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || res.statusText);
          $('analyze-status').textContent = 'Done. ' + data.moments.length + ' moment(s).';
          $('transcript-preview').textContent = 'Transcript saved (' + data.transcript.length + ' chars). uploadId: ' + data.uploadId;
          $('transcript-preview').classList.remove('hidden');
          renderMoments(data.moments);
          $('moments-section').classList.remove('hidden');
          $('packet-root').classList.add('hidden');
          $('packet-root').innerHTML = '';
        } catch (e) {
          $('analyze-status').textContent = String(e.message || e);
        }
        $('btn-analyze').disabled = false;
      };

      function renderMoments(moments) {
        selectedMomentId = null;
        $('btn-generate').disabled = true;
        $('moments-list').innerHTML = moments
          .map(
            (m, i) => `
          <label class="flex items-start gap-3 p-4 rounded-xl border border-gray-200 cursor-pointer hover:bg-gray-50 has-[:checked]:border-orange-400 has-[:checked]:bg-orange-50/30">
            <input type="radio" name="moment" value="${esc(m.id)}" class="mt-1" />
            <div>
              <div class="font-semibold text-gray-900">${esc(m.title)}</div>
              <div class="text-sm text-gray-600 mt-1">${esc(m.description)}</div>
            </div>
          </label>`
          )
          .join('');
        $('moments-list').querySelectorAll('input[name="moment"]').forEach((el) => {
          el.onchange = () => {
            selectedMomentId = el.value;
            $('btn-generate').disabled = !selectedMomentId;
          };
        });
      }

      $('btn-generate').onclick = async () => {
        if (!selectedMomentId) return;
        $('generate-status').textContent = 'Generating (OpenAI)…';
        $('btn-generate').disabled = true;
        try {
          const res = await fetch(API + '/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              momentId: selectedMomentId,
              goal: $('goal').value.trim() || 'social content',
            }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || res.statusText);
          $('generate-status').textContent = '';
          renderPacket(data.packet);
        } catch (e) {
          $('generate-status').textContent = String(e.message || e);
        }
        $('btn-generate').disabled = false;
      };

      function renderPacket(p) {
        const slides = p.carousel_slides && p.carousel_slides.length ? p.carousel_slides : null;
        const ideas = (p.short_form_ideas || []).map((t, i) => `<li class="flex items-start">
          <span class="flex-shrink-0 w-6 h-6 rounded-full bg-amber-100 text-amber-700 flex items-center justify-center text-xs font-bold mr-3 mt-0.5">${i + 1}</span>
          <p class="text-sm text-gray-700 leading-relaxed">${esc(t)}</p>
        </li>`).join('');

        const capBlocks = (p.captions || []).map((cap, index) => {
          const b64 = btoa(unescape(encodeURIComponent(cap)));
          return `
          <div class="bg-gray-50 rounded-lg p-4 border border-gray-200 relative group">
            <button type="button" class="copy-b64-btn absolute top-3 right-3 p-1.5 bg-white rounded-md border border-gray-200 text-gray-500 hover:text-gray-900 text-xs" data-b64="${b64}">Copy</button>
            <div class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Option ${index + 1}</div>
            <p class="text-sm text-gray-800 whitespace-pre-wrap pr-14">${esc(cap)}</p>
          </div>`;
        });

        const scriptBlocks = (p.scripts || []).map((script, index) => {
          const b64 = btoa(unescape(encodeURIComponent(script)));
          return `
          <div class="bg-gray-50 rounded-lg p-4 border border-gray-200 relative group">
            <button type="button" class="copy-b64-btn absolute top-3 right-3 p-1.5 bg-white rounded-md border border-gray-200 text-gray-500 hover:text-gray-900 text-xs" data-b64="${b64}">Copy</button>
            <div class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Option ${index + 1}</div>
            <p class="text-sm text-gray-800 whitespace-pre-wrap pr-14">${esc(script)}</p>
          </div>`;
        });

        let carouselHtml = '';
        if (slides) {
          const allB64 = btoa(unescape(encodeURIComponent(slides.join('\n\n'))));
          carouselHtml = `
          <section class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
            <div class="flex items-center justify-between mb-6 flex-wrap gap-2">
              <h3 class="text-lg font-bold text-gray-900">Carousel post idea</h3>
              <button type="button" class="copy-b64-btn px-3 py-1.5 text-xs font-medium bg-violet-50 text-violet-700 rounded-lg border border-violet-200" data-b64="${allB64}">Copy all slides</button>
            </div>
            <div class="flex gap-4 overflow-x-auto pb-4 snap-x snap-mandatory -mx-2 px-2">
              ${slides
                .map(
                  (slide, index) => `
                <div class="flex-shrink-0 w-64 snap-start bg-gradient-to-br from-gray-900 to-gray-800 rounded-xl p-5 text-white relative">
                  <button type="button" class="copy-b64-btn absolute top-3 right-3 p-1 bg-white/10 rounded-md text-white/80 text-xs" data-b64="${btoa(unescape(encodeURIComponent(slide)))}">Copy</button>
                  <div class="w-7 h-7 rounded-full bg-violet-500 flex items-center justify-center text-xs font-bold mb-3">${index + 1}</div>
                  <p class="text-sm text-gray-200 leading-relaxed whitespace-pre-wrap pr-8">${esc(slide)}</p>
                </div>`
                )
                .join('')}
            </div>
            <p class="text-xs text-gray-400 mt-3">Scroll for all slides · Instagram &amp; LinkedIn carousels</p>
          </section>`;
        }

        $('packet-root').innerHTML = `
          <div class="bg-gradient-to-r from-orange-500 to-rose-500 rounded-2xl p-8 text-white shadow-md">
            <h2 class="text-2xl font-bold mb-2">Your creative packet is ready</h2>
            <p class="text-orange-50 opacity-90">Goal: ${esc(p.goal || '')}</p>
          </div>
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-8">
              <section class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <h3 class="text-lg font-bold text-gray-900 mb-4">Visual ideas</h3>
                <ul class="space-y-4">${ideas}</ul>
              </section>
              <section class="bg-blue-50 rounded-xl border border-blue-100 p-6">
                <h3 class="text-lg font-bold text-blue-900 mb-3">Strategy</h3>
                <p class="text-sm text-blue-800 leading-relaxed">${esc(p.posting_recommendation || '')}</p>
              </section>
            </div>
            <div class="lg:col-span-2 space-y-8">
              <section class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <h3 class="text-lg font-bold text-gray-900 mb-4">Scripts</h3>
                <div class="space-y-4">${scriptBlocks.join('')}</div>
              </section>
              <section class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <h3 class="text-lg font-bold text-gray-900 mb-4">Captions</h3>
                <div class="space-y-4">${capBlocks.join('')}</div>
              </section>
            </div>
          </div>
          ${carouselHtml}
        `;
        $('packet-root').classList.remove('hidden');
        $('packet-root').querySelectorAll('.copy-b64-btn').forEach((btn) => {
          btn.onclick = () => {
            const t = decodeURIComponent(escape(atob(btn.getAttribute('data-b64'))));
            copyText(t, btn);
          };
        });
      }
    </script>
  </body>
</html>
